<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BT Virtual Assistant</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #003580;
      color: #fff;
      padding: 1rem 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header h1 { margin: 0; font-size: 1.25rem; font-weight: 600; }
    header p { margin: 0.35rem 0 0; font-size: 0.85rem; opacity: 0.9; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      line-height: 1.45;
    }
    .msg.user {
      margin-left: auto;
      background: #003580;
      color: #fff;
    }
    .msg.bot {
      margin-right: auto;
      background: #fff;
      border: 1px solid #ccc;
      color: #222;
      /* Show line breaks from the model (\n); default HTML collapses them */
      white-space: pre-line;
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-top: 0.5rem;
      font-weight: 600;
    }
    .badge.rag { background: #cce5ff; color: #004085; }
    .badge.fallback { background: #e2e3e5; color: #383d41; }
    .stars { margin-top: 0.5rem; }
    .stars button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 0.1rem;
      opacity: 0.45;
    }
    .stars button:hover, .stars button.active { opacity: 1; }
    #typing {
      display: none;
      margin-right: auto;
      background: #fff;
      border: 1px dashed #999;
      color: #666;
      padding: 0.6rem 1rem;
      border-radius: 12px;
      margin-bottom: 0.75rem;
    }
    #typing.show { display: block; }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #003580;
      margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
    footer {
      padding: 0.75rem;
      background: #f0f0f0;
      border-top: 1px solid #ccc;
    }
    .input-row {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
    }
    #message {
      flex: 1;
      padding: 0.65rem 0.85rem;
      border: 1px solid #bbb;
      border-radius: 8px;
      font-size: 1rem;
    }
    #send {
      padding: 0.65rem 1.25rem;
      background: #003580;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    #send:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>BT Virtual Assistant</h1>
    <p>Bhutan Telecom Limited — customer support</p>
  </header>
  <div id="chat"></div>
  <div id="typing" aria-live="polite"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <footer>
    <div class="input-row">
      <input type="text" id="message" placeholder="Type your message…" autocomplete="off" />
      <button type="button" id="send">Send</button>
    </div>
  </footer>
  <script>
    // Same port as API (e.g. http://127.0.0.1:8000/ui/) → relative /chat. File or :8080 → full URL.
    (function () {
      const p = location.port;
      const proto = location.protocol;
      const base =
        proto === "file:" || (p && p !== "8000")
          ? "http://127.0.0.1:8000"
          : "";
      window.__BT_API_BASE = base;
    })();
    const API = (window.__BT_API_BASE || "") + "/chat";
    const FEEDBACK_API = (window.__BT_API_BASE || "") + "/feedback";
    const sessionId = crypto.randomUUID();
    const chat = document.getElementById("chat");
    const messageEl = document.getElementById("message");
    const sendBtn = document.getElementById("send");
    const typing = document.getElementById("typing");

    function badgeClass(method) {
      const m = (method || "").toLowerCase();
      if (m === "rag") return "rag";
      if (m === "fallback") return "fallback";
      return "rag";
    }

    function appendUser(text) {
      const div = document.createElement("div");
      div.className = "msg user";
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function appendBot(text, method) {
      const wrap = document.createElement("div");
      wrap.className = "msg bot";
      wrap.textContent = text;
      const badge = document.createElement("span");
      badge.className = "badge " + badgeClass(method);
      badge.textContent = method === "rag" ? "RAG" : method === "fallback" ? "Fallback" : "RAG";
      wrap.appendChild(document.createElement("br"));
      wrap.appendChild(badge);

      const stars = document.createElement("div");
      stars.className = "stars";
      stars.setAttribute("data-session", sessionId);
      for (let r = 1; r <= 5; r++) {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = "★";
        b.title = "Rate " + r;
        b.addEventListener("click", async () => {
          stars.querySelectorAll("button").forEach((x, i) => {
            x.classList.toggle("active", i < r);
          });
          try {
            await fetch(FEEDBACK_API, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ session_id: sessionId, rating: r }),
            });
          } catch (e) { console.warn(e); }
        });
        stars.appendChild(b);
      }
      wrap.appendChild(stars);

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = messageEl.value.trim();
      if (!text) return;
      messageEl.value = "";
      appendUser(text);
      typing.classList.add("show");
      sendBtn.disabled = true;
      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });
        const data = await res.json();
        appendBot(data.response || "", data.method || "");
      } catch (e) {
        appendBot("Could not reach the server. Is the API running on port 8000?", "fallback");
      } finally {
        typing.classList.remove("show");
        sendBtn.disabled = false;
        messageEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    messageEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
